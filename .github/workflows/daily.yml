name: Daily Signal Update

on:
  schedule:
    - cron: "0 22 * * *"  # 06:00 UTC+8 (台灣時間)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Fetch spot prices
        run: python scripts/fetch_spot.py

      - name: Calculate scores
        run: python scripts/calc_score.py

      - name: Copy data to docs
        run: |
          mkdir -p docs/data
          cp data/*.json docs/data/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data/
          git diff --cached --quiet || git commit -m "chore: daily signal update $(date -u +%Y-%m-%d)"
          git push
